services:
  - type: web
    name: cryptanium-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cryptanium-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SCANNER_MAX_CONCURRENCY
        value: "1"

databases:
  - name: cryptanium-postgres
    databaseName: cryptanium
    user: cryptanium_user
    plan: free
